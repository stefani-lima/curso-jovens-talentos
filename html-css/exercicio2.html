<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Crie a sua conta aqui</h1>

    <form action="teste.php" method="post">
        <div class="card_formulario">
            <div class="informacoes_pessoais">
                <fieldset>
                    <!-- EMAIL -->
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email">
                    <!-- SENHA -->
                    <label for="senha">Senha:</label>
                    <input type="password" name="senha" id="senha">
                    <!-- IDADE -->
                    <label for="idade">Idade:</label>
                    <select name="idade" id="idade">
                        <option value="" disabled selected>Selecione a idade</option>
                        <option value="18">18</option>
                        <option value="19">19</option>
                        <option value="20">20</option>
                        <option value="21">21</option>
                    </select>
                </fieldset>
            </div>

            <div class="sobre">
                <fieldset>
                    <!-- SOBRE -->
                    <label for="sobre">Conte-nos um pouco sobre você:</label>
                    <textarea name="sobre" id="sobre"></textarea> 
                </fieldset>
            </div>
            <div class="termos">
                <!-- TERMOS -->
                <input type="checkbox" name="termos" id="termos">
                <label for="termos">Eu concordo com os <a href="" target="_blank">termos de serviço</a></label>
            </div>
            <!-- SUBMIT -->
            <input type="submit" value="Inscrever-se">
        </div>    
    </form>
</body>
</html>
